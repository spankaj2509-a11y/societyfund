<!DOCTYPE html>
<html>
<head>
    <title>User Search Results</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .filter-section {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-controls select {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .back-link {
            margin-top: 20px;
        }
        .back-link a {
            color: #4CAF50;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Search Results for Contact: {{ contact }}</h1>
    
    <div class="filter-section">
        <h3>Filter Results by Month & Year</h3>
        <div class="filter-controls">
            <label for="month">Month:</label>
            <select id="month" onchange="filterResults()">
                <option value="">All Months</option>
                <option value="1" {% if month == 1 %}selected{% endif %}>January</option>
                <option value="2" {% if month == 2 %}selected{% endif %}>February</option>
                <option value="3" {% if month == 3 %}selected{% endif %}>March</option>
                <option value="4" {% if month == 4 %}selected{% endif %}>April</option>
                <option value="5" {% if month == 5 %}selected{% endif %}>May</option>
                <option value="6" {% if month == 6 %}selected{% endif %}>June</option>
                <option value="7" {% if month == 7 %}selected{% endif %}>July</option>
                <option value="8" {% if month == 8 %}selected{% endif %}>August</option>
                <option value="9" {% if month == 9 %}selected{% endif %}>September</option>
                <option value="10" {% if month == 10 %}selected{% endif %}>October</option>
                <option value="11" {% if month == 11 %}selected{% endif %}>November</option>
                <option value="12" {% if month == 12 %}selected{% endif %}>December</option>
            </select>
            
            <label for="year">Year:</label>
            <select id="year" onchange="filterResults()">
                <option value="">All Years</option>
                <option value="2023" {% if year == 2023 %}selected{% endif %}>2023</option>
                <option value="2024" {% if year == 2024 %}selected{% endif %}>2024</option>
                <option value="2025" {% if year == 2025 %}selected{% endif %}>2025</option>
                <option value="2026" {% if year == 2026 %}selected{% endif %}>2026</option>
            </select>
        </div>
    </div>
    
    <div id="results-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Contact</th>
                    <th>Date</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="results-table">
                {% for user in users %}
                <tr>
                    <td>{{ user.id }}</td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.contact }}</td>
                    <td>{{ user.date }}</td>
                    <td>{{ user.amount }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
    <div class="back-link">
        <a href="/">Back to Search</a>
    </div>

    <script>
        const contact = "{{ contact }}";
        
        function filterResults() {
            const month = document.getElementById('month').value;
            const year = document.getElementById('year').value;
            
            // Make AJAX request to get filtered results
            const params = new URLSearchParams();
            params.append('contact', contact);
            if (month) params.append('month', month);
            if (year) params.append('year', year);
            
            fetch('/search?' + params.toString(), {
                method: 'GET',
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => response.json())
            .then(data => {
                const tbody = document.getElementById('results-table');
                tbody.innerHTML = '';
                
                if (data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No records found</td></tr>';
                } else {
                    data.users.forEach(user => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.name}</td>
                            <td>${user.contact}</td>
                            <td>${user.date}</td>
                            <td>${user.amount}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
