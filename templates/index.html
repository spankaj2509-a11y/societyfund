<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .search-container {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }
        
        .search-container h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 700;
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background-color: #667eea;
            border-color: #667eea;
            padding: 10px;
            font-weight: 600;
        }
        
        .btn-primary:hover {
            background-color: #764ba2;
            border-color: #764ba2;
        }
        
        .admin-link {
            text-align: center;
            margin-top: 30px;
        }
        
        .admin-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .admin-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }
        
        .form-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }
        
        @media (max-width: 768px) {
            .search-container {
                padding: 30px 20px;
                margin: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="search-container">
        <h1><i class="fas fa-search"></i> User Search</h1>
        <form action="/search" method="post">
            <div class="form-group mb-4">
                <label for="contact" class="form-label">Enter Contact Number:</label>
                <input type="text" class="form-control form-control-lg" id="contact" name="contact" placeholder="e.g., 9876543210" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                <i class="fas fa-search"></i> Search
            </button>
        </form>
        
        <div class="admin-link">
            <p>Are you an admin?</p>
            <a href="/admin/login"><i class="fas fa-lock"></i> Go to Admin Panel</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
